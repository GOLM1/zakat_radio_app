name: zakat_radio_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+4

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  audio_session: ^0.1.25
  just_audio: ^0.9.36
  just_audio_background: ^0.0.1-beta.17
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
